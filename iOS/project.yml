name: Pupgrowth
options:
  bundleIdPrefix: com.shimondeitel.puppymile
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Pupgrowth:
    type: application
    platform: iOS
    sources:
      - path: Pupgrowth
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.puppymile
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Pupgrowth/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  PupgrowthTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PupgrowthTests
      - path: Pupgrowth.storekit
    dependencies:
      - target: Pupgrowth
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.puppymile.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  PupgrowthUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PupgrowthUITests
    dependencies:
      - target: Pupgrowth
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.puppymile.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Pupgrowth:
    build:
      targets:
        Pupgrowth: all
        PupgrowthTests: [test]
        PupgrowthUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Pupgrowth.storekit
    test:
      config: Debug
      storeKitConfiguration: Pupgrowth.storekit
      targets:
        - PupgrowthTests
        - PupgrowthUITests
    archive:
      config: Release
